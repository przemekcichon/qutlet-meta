<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strefa okazji — Qutlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<!-- → archive-product.php + widget filtrów (np. FacetWP) -->
<body data-page="strefa-okazji">
<div data-include="partials/header.html"></div>

<main class="wrap">
  <nav class="breadcrumbs">
    <a href="index.html">Home</a><span class="sep">/</span>
    <span class="current">Strefa okazji</span>
  </nav>
  <div class="page-head">
    <h1 class="page-title">Strefa okazji</h1>
    <p class="page-lead">Wszystkie pojedyncze egzemplarze w jednym miejscu. Filtruj po marce, kategorii, klasie stanu i cenie.</p>
  </div>

  <div class="toolbar">
    <button type="button" class="filter-btn" data-open-drawer>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"></path></svg>
      Filtry
      <span class="filter-btn-count" data-filter-count hidden>0</span>
    </button>
    <span class="result-count" data-result-count></span>
    <div class="sort-wrap">
      <label for="sort">Sortuj:</label>
      <select id="sort" data-sort>
        <option value="rel">Trafność</option>
        <option value="price-asc">Cena: rosnąco</option>
        <option value="price-desc">Cena: malejąco</option>
        <option value="save">Największy rabat</option>
      </select>
    </div>
  </div>

  <div class="chips-row" data-chips hidden></div>

  <div class="grid-3" data-deals-grid></div>

  <div class="empty-state" data-empty-state hidden>
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" class="empty-icon" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path><path d="M8 11h6"></path></svg>
    <h3>Brak produktów dla wybranych filtrów</h3>
    <p>Spróbuj poluzować kryteria lub wyczyścić filtry.</p>
  </div>

  <div class="pager" data-pager hidden></div>
</main>

<!-- szuflada filtrów -->
<div class="drawer-overlay" data-drawer-overlay hidden></div>
<aside class="drawer" data-drawer hidden>
  <div class="drawer-head">
    <h3>Filtry</h3>
    <button type="button" class="icon-btn icon-btn-sm" data-close-drawer aria-label="Zamknij filtry">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>
  </div>
  <div class="drawer-body">
    <div class="facet-group">
      <div class="facet-title">Kategoria</div>
      <div class="facet-list" data-facet-cat></div>
    </div>
    <div class="facet-group">
      <div class="facet-title">Marka</div>
      <div class="facet-list" data-facet-brand></div>
    </div>
    <div class="facet-group">
      <div class="facet-title">Klasa stanu</div>
      <div class="facet-list" data-facet-cls></div>
    </div>
    <div class="facet-group">
      <div class="facet-title">Cena</div>
      <div class="price-readout"><span data-price-min>0 zł</span><span data-price-max>5 500 zł</span></div>
      <div class="price-sliders">
        <input type="range" min="0" max="5500" step="50" value="0" data-range-min>
        <input type="range" min="0" max="5500" step="50" value="5500" data-range-max>
      </div>
    </div>
  </div>
  <div class="drawer-foot">
    <button type="button" class="text-btn drawer-clear" data-clear-filters>Wyczyść</button>
    <button type="button" class="btn btn-primary btn-lg" data-close-drawer data-drawer-show>Pokaż wyniki</button>
  </div>
</aside>

<div data-include="partials/footer.html"></div>
<script src="js/data.js"></script>
<script src="js/templates.js"></script>
<script src="js/app.js"></script>
</body>
</html>
