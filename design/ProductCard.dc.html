<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="background:#ffffff;border:1px solid #e9e5f0;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .18s, box-shadow .18s;" style-hover="transform:translateY(-4px);box-shadow:0 1px 2px rgba(22,16,31,.04), 0 8px 30px -12px rgba(22,16,31,.12);" onClick="{{ onOpen }}">
  <div style="position:relative;aspect-ratio:1/1;background:#f3f0f8;overflow:hidden;">
    <div style="position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:7px;align-items:flex-start;z-index:2;">
      <span style="font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;line-height:1;display:inline-flex;align-items:center;gap:5px;background:#16101f;color:#fff;"><span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:{{ product.dotColor }};"></span>Klasa {{ product.cls }}</span>
      <span style="font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;line-height:1;background:#fff;color:#6620c4;border:1px solid #e9e5f0;box-shadow:0 1px 2px rgba(22,16,31,.04);">Pojedyncza sztuka</span>
    </div>
    <span style="position:absolute;top:12px;right:12px;z-index:2;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;line-height:1;background:#a8e832;color:#243d00;">{{ product.savePctLabel }}</span>
    <sc-if value="{{ product.img }}"><img src="{{ product.img }}" alt="{{ product.title }}" style="width:100%;height:100%;object-fit:contain;padding:18px;mix-blend-mode:multiply;" /></sc-if>
    <sc-if value="{{ product.noImg }}">
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(135deg, #ece8f4 0 12px, #f4f1f9 12px 24px);display:flex;align-items:center;justify-content:center;color:#9a90ab;font-family:'Sora',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:14px;">{{ product.ph }}</div>
    </sc-if>
  </div>
  <div style="padding:16px 17px 18px;display:flex;flex-direction:column;gap:11px;flex:1;">
    <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#3f6212;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"></path><path d="M4 9h11a5 5 0 0 1 5 5v3"></path></svg>
      Zwrot 14-dniowy · {{ product.condLabel }}
    </span>
    <h3 style="font-family:'Sora',system-ui,sans-serif;font-size:15.5px;font-weight:700;line-height:1.28;letter-spacing:-.01em;color:#16101f;margin:0;">{{ product.title }}</h3>
    <div style="margin-top:auto;display:flex;align-items:center;gap:10px;">
      <span style="font-family:'Sora',system-ui,sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;">{{ product.priceNow }}</span>
      <span style="font-size:14px;color:#79707f;text-decoration:line-through;">{{ product.priceOld }}</span>
      <button onClick="{{ onAdd }}" aria-label="Dodaj do koszyka" style="margin-left:auto;width:40px;height:40px;border-radius:11px;background:#7c2fe0;color:#fff;display:grid;place-items:center;flex-shrink:0;border:0;cursor:pointer;transition:background .15s,transform .12s;" style-hover="background:#6620c4;transform:scale(1.06);">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
      </button>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:248,&quot;height&quot;:360},&quot;product&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;onOpen&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onAdd&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e:any) =&gt; void&quot;}}"></script>
</body>
</html>
